<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Transitions</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#f2f2f2;color:#1a1a1a;font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:24px;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;align-items:center;gap:16px;max-width:1024px;width:100%}
#canvas-wrap{width:1024px;height:1024px;background:#fff;position:relative;flex-shrink:0}
#canvas-wrap canvas{display:block}
#controls{display:flex;align-items:center;justify-content:space-between;width:1024px;gap:12px}
#mode-selector{display:flex;gap:2px;background:#e0e0e0;padding:2px}
.mode-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.04em;text-transform:lowercase;padding:6px 14px;border:none;background:transparent;color:#888;cursor:pointer;transition:background .15s,color .15s;line-height:1}
.mode-btn:hover{color:#1a1a1a}
.mode-btn.active{background:#fff;color:#1a1a1a}
#fps{font-size:10px;color:#aaa;letter-spacing:.05em;min-width:60px;text-align:right}
#grid-info{font-size:10px;color:#aaa;letter-spacing:.05em}
#prompt-wrap{width:1024px;position:relative}
#prompt{width:100%;font-family:'Inter',sans-serif;font-size:14px;padding:12px 16px;border:1px solid #d0d0d0;background:#fff;color:#1a1a1a;outline:none;transition:border-color .15s}
#prompt::placeholder{color:#bbb}
#prompt:focus{border-color:#888}
#action-bar{display:flex;align-items:center;justify-content:space-between;width:1024px;gap:8px}
#action-bar .left,#action-bar .right{display:flex;gap:4px}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.04em;text-transform:lowercase;padding:6px 14px;border:1px solid #d0d0d0;background:#fff;color:#1a1a1a;cursor:pointer;transition:background .15s,border-color .15s;line-height:1}
.action-btn:hover{background:#e8e8e8;border-color:#aaa}
.action-btn:disabled{color:#ccc;border-color:#e0e0e0;cursor:default;background:#f8f8f8}
.action-btn.recording{color:#1a1a1a;border-color:#999;background:#e0e0e0}
#export-progress{font-size:10px;color:#888;letter-spacing:.05em}
#history{width:1024px;display:flex;gap:8px;overflow-x:auto;padding:4px 0;scrollbar-width:thin;scrollbar-color:#ccc transparent}
#history:empty::before{content:'no saved animations yet';font-size:10px;color:#bbb;letter-spacing:.04em;padding:24px 0}
.history-card{flex-shrink:0;width:120px;cursor:pointer;border:1px solid #d0d0d0;background:#fff;transition:border-color .15s;position:relative}
.history-card:hover{border-color:#888}
.history-card.active{border-color:#1a1a1a}
.history-card canvas,.history-card img{display:block;width:120px;height:120px;object-fit:cover}
.history-card .card-label{font-size:9px;padding:4px 6px;color:#888;letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-card .card-mode{font-size:8px;padding:0 6px 4px;color:#aaa;text-transform:lowercase}
.history-card .card-delete{position:absolute;top:2px;right:2px;width:16px;height:16px;font-size:10px;line-height:16px;text-align:center;background:rgba(255,255,255,.85);border:none;cursor:pointer;color:#aaa;opacity:0;transition:opacity .15s}
.history-card:hover .card-delete{opacity:1}
.history-card .card-delete:hover{color:#1a1a1a}
.section-label{width:1024px;font-size:9px;color:#aaa;letter-spacing:.08em;text-transform:uppercase;padding-top:8px}
</style>
</head>
<body>
<div id="app">
  <div id="controls">
    <div id="mode-selector">
      <button class="mode-btn active" data-mode="glyphs">glyphs</button>
      <button class="mode-btn" data-mode="bands">bands</button>
      <button class="mode-btn" data-mode="modern">modern</button>
    </div>
    <span id="grid-info">12x12 / 6 levels</span>
    <span id="fps">-- fps</span>
  </div>
  <div id="canvas-wrap"></div>
  <div id="prompt-wrap">
    <input type="text" id="prompt" placeholder="describe a transition..." autocomplete="off" spellcheck="false">
  </div>
  <div id="action-bar">
    <div class="left">
      <button class="action-btn" id="btn-save">save</button>
      <button class="action-btn" id="btn-new">+ new</button>
    </div>
    <span id="export-progress"></span>
    <div class="right">
      <button class="action-btn" id="btn-download">download gif</button>
    </div>
  </div>
  <span class="section-label">session history</span>
  <div id="history"></div>
</div>

<script>
// Config
var MODES = {
  glyphs: { grid: 12, levels: 6, label: '12x12 / 6 levels' },
  bands:  { grid: 40, levels: 16, label: '40x40 / 16 levels' },
  modern: { grid: 100, levels: 256, label: '100x100 / 256 levels' }
};
var CANVAS_SIZE = 1024;
var EDGE_WIDTH = 0.08;

// State
var currentMode = 'glyphs';
var gridSize = MODES[currentMode].grid;
var greyLevels = MODES[currentMode].levels;
var cellSize = CANVAS_SIZE / gridSize;
var gridValues = [];
var animProgress = { value: 0 };
var thresholdFunc = null;
var activeEntryId = null;
var activeEntryCode = null;
var sessionEntries = [];
var tl = null;
var isExporting = false;

// Math helpers (available to AI code)
function smoothstep(e0, e1, x) { var t = clamp((x - e0) / (e1 - e0), 0, 1); return t * t * (3 - 2 * t); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function fract(x) { return x - Math.floor(x); }
function mix(a, b, t) { return a + (b - a) * t; }
function hash(x, y) { return fract(Math.sin(x * 127.1 + y * 311.7) * 43758.5453); }

// Default threshold: radial from center
function defaultThreshold(x, y) {
  var dx = x - 0.5, dy = y - 0.5;
  return clamp(Math.sqrt(dx * dx + dy * dy) * 1.4, 0, 1);
}
thresholdFunc = defaultThreshold;

// Grid
function initGrid() {
  gridValues = [];
  for (var r = 0; r < gridSize; r++) gridValues[r] = new Float32Array(gridSize);
}
function quantize(val, levels) {
  if (levels >= 256) return val;
  var step = 1 / (levels - 1);
  return Math.round(val / step) * step;
}

// Animation engine: enforces white > black > white
function updateGrid() {
  var t = animProgress.value;
  var fn = thresholdFunc;
  if (!fn) return;
  // Sweep goes 0>1>0: first half darkens, second half lightens
  var sweep = t < 0.5 ? t * 2 : (1 - t) * 2;
  for (var row = 0; row < gridSize; row++) {
    for (var col = 0; col < gridSize; col++) {
      var nx = gridSize > 1 ? col / (gridSize - 1) : 0.5;
      var ny = gridSize > 1 ? row / (gridSize - 1) : 0.5;
      var threshold;
      try { threshold = clamp(fn(nx, ny), 0, 1); } catch(e) { threshold = 0.5; }
      var dist = Math.abs(threshold - sweep);
      gridValues[row][col] = clamp(smoothstep(0, EDGE_WIDTH, dist), 0, 1);
    }
  }
}

// p5 sketch
var sketch = function(p) {
  p.setup = function() {
    var c = p.createCanvas(CANVAS_SIZE, CANVAS_SIZE);
    c.parent('canvas-wrap');
    p.noStroke();
    p.pixelDensity(1);
    initGrid();
    startAnimation(3);
  };
  p.draw = function() {
    updateGrid();
    for (var row = 0; row < gridSize; row++) {
      for (var col = 0; col < gridSize; col++) {
        var q = quantize(gridValues[row][col], greyLevels);
        p.fill(Math.round(q * 255));
        p.rect(col * cellSize, row * cellSize, cellSize, cellSize);
      }
    }
    if (p.frameCount % 10 === 0) {
      document.getElementById('fps').textContent = Math.round(p.frameRate()) + ' fps';
    }
  };
};
new p5(sketch);

// GSAP timeline
function startAnimation(duration) {
  if (tl) tl.kill();
  animProgress.value = 0;
  tl = gsap.timeline({ repeat: -1 });
  tl.to(animProgress, { value: 1, duration: duration || 3, ease: 'power2.inOut' });
}

// Compile AI threshold code into a function(x, y)
function compileAnimation(codeStr) {
  try {
    var fn = new Function('x', 'y', 'smoothstep', 'clamp', 'fract', 'mix', 'hash', 'Math', codeStr);
    return function(x, y) { return fn(x, y, smoothstep, clamp, fract, mix, hash, Math); };
  } catch(e) { console.error('Compile error:', e); return null; }
}

// Mode selector
document.querySelectorAll('.mode-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelector('.mode-btn.active').classList.remove('active');
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    var mode = MODES[currentMode];
    gridSize = mode.grid;
    greyLevels = mode.levels;
    cellSize = CANVAS_SIZE / gridSize;
    document.getElementById('grid-info').textContent = mode.label;
    initGrid();
  });
});

// Prompt input
document.getElementById('prompt').addEventListener('keydown', async function(e) {
  if (e.key !== 'Enter') return;
  var input = e.target.value.trim();
  if (!input) return;
  var promptEl = e.target;
  promptEl.disabled = true;
  promptEl.style.opacity = '0.5';

  try {
    var response = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: input })
    });
    if (response.ok) {
      var params = await response.json();
      var fn = compileAnimation(params.code);
      if (fn) {
        var test = fn(0.5, 0.5);
        if (typeof test === 'number' && !isNaN(test)) {
          thresholdFunc = fn;
          activeEntryCode = params.code;
          if (params.suggestedMode && MODES[params.suggestedMode]) {
            currentMode = params.suggestedMode;
            var mode = MODES[currentMode];
            gridSize = mode.grid;
            greyLevels = mode.levels;
            cellSize = CANVAS_SIZE / gridSize;
            document.getElementById('grid-info').textContent = mode.label;
            document.querySelector('.mode-btn.active').classList.remove('active');
            document.querySelector('.mode-btn[data-mode="' + currentMode + '"]').classList.add('active');
            initGrid();
          }
          startAnimation(params.duration || 3);
        }
      }
    }
  } catch(err) {
    console.log('AI unavailable:', err.message);
    thresholdFunc = defaultThreshold;
    startAnimation(3);
  }
  promptEl.disabled = false;
  promptEl.style.opacity = '1';
});

// Session storage
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function captureThumbnail() {
  var mc = document.querySelector('#canvas-wrap canvas');
  if (!mc) return null;
  var t = document.createElement('canvas'); t.width = 120; t.height = 120;
  t.getContext('2d').drawImage(mc, 0, 0, 120, 120);
  return t.toDataURL('image/png');
}
function saveEntry() {
  var pt = document.getElementById('prompt').value.trim() || 'untitled';
  var entry = { id: activeEntryId || uid(), prompt: pt, code: activeEntryCode, mode: currentMode,
    duration: tl ? tl.duration() : 3, thumbnail: captureThumbnail(), timestamp: Date.now() };
  if (activeEntryId) {
    var idx = sessionEntries.findIndex(function(e) { return e.id === activeEntryId; });
    if (idx !== -1) sessionEntries[idx] = entry; else { sessionEntries.push(entry); activeEntryId = entry.id; }
  } else { sessionEntries.push(entry); activeEntryId = entry.id; }
  persistSession(); renderHistory();
}
function loadEntry(id) {
  var entry = sessionEntries.find(function(e) { return e.id === id; });
  if (!entry) return;
  activeEntryId = id;
  document.getElementById('prompt').value = entry.prompt;
  if (entry.code) { var fn = compileAnimation(entry.code); if (fn) thresholdFunc = fn; activeEntryCode = entry.code; }
  else { thresholdFunc = defaultThreshold; }
  currentMode = entry.mode || 'bands';
  var mode = MODES[currentMode]; gridSize = mode.grid; greyLevels = mode.levels; cellSize = CANVAS_SIZE / gridSize;
  document.getElementById('grid-info').textContent = mode.label;
  document.querySelector('.mode-btn.active').classList.remove('active');
  document.querySelector('.mode-btn[data-mode="' + currentMode + '"]').classList.add('active');
  initGrid(); startAnimation(entry.duration || 3); renderHistory();
}
function deleteEntry(id) {
  sessionEntries = sessionEntries.filter(function(e) { return e.id !== id; });
  if (activeEntryId === id) activeEntryId = null;
  persistSession(); renderHistory();
}
function newAnimation() {
  activeEntryId = null; activeEntryCode = null;
  document.getElementById('prompt').value = '';
  thresholdFunc = defaultThreshold; startAnimation(3); renderHistory();
}
function persistSession() { try { sessionStorage.setItem('at_session', JSON.stringify(sessionEntries)); } catch(e) {} }
function restoreSession() { try { var r = sessionStorage.getItem('at_session'); if (r) { sessionEntries = JSON.parse(r); renderHistory(); } } catch(e) { sessionEntries = []; } }
function renderHistory() {
  var c = document.getElementById('history'); c.innerHTML = '';
  sessionEntries.forEach(function(entry) {
    var card = document.createElement('div');
    card.className = 'history-card' + (entry.id === activeEntryId ? ' active' : '');
    if (entry.thumbnail) { var img = document.createElement('img'); img.src = entry.thumbnail; img.alt = entry.prompt; card.appendChild(img); }
    var label = document.createElement('div'); label.className = 'card-label'; label.textContent = entry.prompt; card.appendChild(label);
    var ml = document.createElement('div'); ml.className = 'card-mode'; ml.textContent = entry.mode; card.appendChild(ml);
    var del = document.createElement('button'); del.className = 'card-delete'; del.textContent = 'x';
    del.addEventListener('click', function(ev) { ev.stopPropagation(); deleteEntry(entry.id); }); card.appendChild(del);
    card.addEventListener('click', function() { loadEntry(entry.id); }); c.appendChild(card);
  });
}
document.getElementById('btn-save').addEventListener('click', saveEntry);
document.getElementById('btn-new').addEventListener('click', newAnimation);
restoreSession();

// GIF export
document.getElementById('btn-download').addEventListener('click', function() { if (!isExporting) exportGif(); });
function exportGif() {
  isExporting = true;
  var btn = document.getElementById('btn-download');
  var prog = document.getElementById('export-progress');
  btn.classList.add('recording'); btn.disabled = true; btn.textContent = 'recording...';
  if (tl) tl.pause();
  var gif = new GIF({ workers: 2, quality: 10, width: CANVAS_SIZE, height: CANVAS_SIZE,
    workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js' });
  var frames = 60, delay = Math.round(2000 / frames);
  var mc = document.querySelector('#canvas-wrap canvas');
  for (var i = 0; i <= frames; i++) {
    animProgress.value = i / frames; updateGrid();
    var ctx = mc.getContext('2d'); ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    for (var row = 0; row < gridSize; row++) for (var col = 0; col < gridSize; col++) {
      var q = quantize(gridValues[row][col], greyLevels); var g = Math.round(q * 255);
      ctx.fillStyle = 'rgb(' + g + ',' + g + ',' + g + ')';
      ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
    }
    gif.addFrame(mc, { copy: true, delay: delay });
    prog.textContent = 'frame ' + (i + 1) + '/' + (frames + 1);
  }
  prog.textContent = 'encoding...';
  gif.on('finished', function(blob) {
    var url = URL.createObjectURL(blob); var a = document.createElement('a');
    var name = (document.getElementById('prompt').value.trim() || 'animation').replace(/[^a-z0-9\- ]/gi, '').replace(/\s+/g, '-').slice(0, 40);
    a.href = url; a.download = name + '_' + currentMode + '.gif';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    isExporting = false; btn.classList.remove('recording'); btn.disabled = false;
    btn.textContent = 'download gif'; prog.textContent = ''; startAnimation();
  });
  gif.render();
}
</script>
</body>
</html>
