  /* ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ

  .action-btn {

  /* ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ
     Session history ├втВмтАЭ horizontal strip of saved animations
  ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ├втВмтАЭ */
  #history {

    gap: 8px;

  #history:empty::before {
    content: 'no saved animations yet';
    font-size: 10px;
    color: #bbb;
    letter-spacing: 0.04em;
    padding: 24px 0;

  .history-card {
    flex-shrink: 0;

    cursor: pointer;
    border: 1px solid #d0d0d0;
    background: #fff;
    transition: border-color 0.15s;

  }

  .history-card:hover {
    border-color: #888;
  }

  .history-card.active {
    border-color: #1a1a1a;
  }

  .history-card canvas,
  .history-card img {
    display: block;
    width: 120px;
    height: 120px;
    object-fit: cover;
  }

  .history-card .card-label {
    font-size: 9px;

    text-transform: lowercase;
  }

  .history-card .card-delete {

    right: 2px;
    width: 16px;
    height: 16px;
    font-size: 10px;
    line-height: 16px;
    text-align: center;
    background: rgba(255,255,255,0.85);
    border: none;
    cursor: pointer;
    color: #aaa;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .history-card:hover .card-delete {
    opacity: 1;
  }

  .history-card .card-delete:hover {
    color: #1a1a1a;
  }

  /* Section label */
  .section-label {
    width: 1024px;
    font-size: 9px;
    color: #aaa;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding-top: 8px;
  }

  <div id="controls">

  <!-- p5.js canvas renders here -->
  <div id="canvas-wrap"></div>

  <!-- Prompt input below canvas -->
  <div id="prompt-wrap">
    <input
      type="text"
      id="prompt"
      placeholder="describe an animation..."
      autocomplete="off"
      spellcheck="false"
    >
  </div>

  <!-- Action bar ├втВмтАЭ save, new, download -->
  <div id="action-bar">
    <div class="left">
      <button class="action-btn" id="btn-save">save</button>
      <button class="action-btn" id="btn-new">+ new</button>
    </div>
    <span id="export-progress"></span>
    <div class="right">
      <button class="action-btn" id="btn-download">download gif</button>
    </div>
  </div>

  <!-- Session history -->
  <span class="section-label">session history</span>
  <div id="history"></div>
</div>

<script>
// ====================================================================
// CONFIGURATION ├втВмтАЭ pixel mode definitions
// Each mode defines grid resolution and number of grey levels
// ====================================================================
const MODES = {
  glyphs: { grid: 12,  levels: 6,   label: '12├ГтАФ12 ├В┬╖ 6 levels' },
  bands:  { grid: 40,  levels: 16,  label: '40├ГтАФ40 ├В┬╖ 16 levels' },
  modern: { grid: 100, levels: 256, label: '100├ГтАФ100 ├В┬╖ 256 levels' }
};

const CANVAS_SIZE = 1024;

// ====================================================================
// STATE
// ====================================================================
let currentMode = 'glyphs';
let gridSize = MODES[currentMode].grid;
let greyLevels = MODES[currentMode].levels;
let cellSize = CANVAS_SIZE / gridSize;

let gridValues = [];
let animProgress = { value: 0 };

// The custom brightness function generated by AI
// Signature: (x, y, t) => brightness 0├втВмтАЬ1
let brightnessFunc = null;

// ====================================================================
// MATH HELPERS ├втВмтАЭ available to AI-generated code
// ====================================================================
function smoothstep(edge0, edge1, x) {
  const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
  return t * t * (3 - 2 * t);
}

function clamp(val, min, max) {
  return Math.max(min, Math.min(max, val));
}

function fract(x) {
  return x - Math.floor(x);
}

function mix(a, b, t) {
  return a + (b - a) * t;
}

function hash(x, y) {
  return fract(Math.sin(x * 127.1 + y * 311.7) * 43758.5453);
}

// ====================================================================
// DEFAULT ANIMATION тАФ radial transition white тЖТ black тЖТ white
// ====================================================================
function defaultBrightness(x, y, t) {
  const dx = x - 0.5;
  const dy = y - 0.5;
  const dist = Math.sqrt(dx * dx + dy * dy) / 0.7071;
  const d = Math.abs(dist * 0.8 + 0.1 - t);
  return clamp(smoothstep(0, 0.12, d), 0, 1);
}

brightnessFunc = defaultBrightness;

// ====================================================================
// p5.js SKETCH
// ====================================================================
const sketch = (p) => {
  p.setup = () => {
    const canvas = p.createCanvas(CANVAS_SIZE, CANVAS_SIZE);
    canvas.parent('canvas-wrap');
    p.noStroke();
    p.pixelDensity(1);
    initGrid();
    startAnimation(3, false);
  };

  p.draw = () => {
    updateGrid();

    for (let row = 0; row < gridSize; row++) {
      for (let col = 0; col < gridSize; col++) {
        const raw = gridValues[row][col];
        const quantized = quantize(raw, greyLevels);
        const grey = Math.round(quantized * 255);
        p.fill(grey);
        p.rect(col * cellSize, row * cellSize, cellSize, cellSize);
      }
    }

    if (p.frameCount % 10 === 0) {
      document.getElementById('fps').textContent =
        Math.round(p.frameRate()) + ' fps';
    }
  };
};

new p5(sketch);

// ====================================================================
// GRID
// ====================================================================
function initGrid() {
  gridValues = [];
  for (let r = 0; r < gridSize; r++) {
    gridValues[r] = new Float32Array(gridSize);
  }
}

function quantize(val, levels) {
  if (levels >= 256) return val;
  const step = 1 / (levels - 1);
  return Math.round(val / step) * step;
}

// ====================================================================
// ANIMATION ENGINE ├втВмтАЭ executes AI-generated brightness function
// ====================================================================
function updateGrid() {
  const t = animProgress.value;
  const fn = brightnessFunc;
  if (!fn) return;

  for (let row = 0; row < gridSize; row++) {
    for (let col = 0; col < gridSize; col++) {
      const nx = col / (gridSize - 1 || 1);
      const ny = row / (gridSize - 1 || 1);

      try {
        gridValues[row][col] = clamp(fn(nx, ny, t), 0, 1);
      } catch (e) {
        gridValues[row][col] = 0;
      }
    }
  }
}

// ====================================================================
// GSAP TIMELINE
// ====================================================================
let tl;

function startAnimation(duration, yoyo) {
  if (tl) tl.kill();
  animProgress.value = 0;

  tl = gsap.timeline({ repeat: -1, yoyo: yoyo !== false });
  tl.to(animProgress, {
    value: 1,
    duration: duration || 3,
    ease: 'power2.inOut'
  });
}

// ====================================================================
// COMPILE AI CODE ├втВмтАЭ safely turn a code string into a function
// ====================================================================
function compileAnimation(codeStr) {
  try {
    // Create a function with access to our math helpers
    // The AI code is the function body, receiving x, y, t
    const fn = new Function(
      'x', 'y', 't',
      'smoothstep', 'clamp', 'fract', 'mix', 'hash',
      'Math',
      codeStr
    );

    // Wrap to inject helpers
    return function(x, y, t) {
      return fn(x, y, t, smoothstep, clamp, fract, mix, hash, Math);
    };
  } catch (e) {
    console.error('Failed to compile animation:', e);
    return null;
  }
}

// ====================================================================
// MODE SELECTOR
// ====================================================================
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('.mode-btn.active').classList.remove('active');
    btn.classList.add('active');

    currentMode = btn.dataset.mode;
    const mode = MODES[currentMode];
    gridSize = mode.grid;
    greyLevels = mode.levels;
    cellSize = CANVAS_SIZE / gridSize;

    document.getElementById('grid-info').textContent = mode.label;
    initGrid();
  });
});

// ====================================================================
// PROMPT INPUT ├втВмтАЭ send to AI, compile returned code
// ====================================================================
document.getElementById('prompt').addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return;

  const input = e.target.value.trim();
  if (!input) return;

  const promptEl = e.target;
  promptEl.disabled = true;
  promptEl.style.opacity = '0.5';

  try {
    const response = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: input })
    });

    if (response.ok) {
      const params = await response.json();

      // Compile the AI-generated code into a function
      const fn = compileAnimation(params.code);

      if (fn) {
        // Test it with a sample call to make sure it doesn't crash
        const testResult = fn(0.5, 0.5, 0.5);
        if (typeof testResult === 'number' && !isNaN(testResult)) {
          brightnessFunc = fn;
          activeEntryCode = params.code; // Store code for session save

          // Apply suggested mode
          if (params.suggestedMode && MODES[params.suggestedMode]) {
            currentMode = params.suggestedMode;
            const mode = MODES[currentMode];
            gridSize = mode.grid;
            greyLevels = mode.levels;
            cellSize = CANVAS_SIZE / gridSize;
            document.getElementById('grid-info').textContent = mode.label;

            document.querySelector('.mode-btn.active').classList.remove('active');
            document.querySelector(`.mode-btn[data-mode="${currentMode}"]`).classList.add('active');
            initGrid();
          }

          startAnimation(params.duration || 3, params.yoyo !== false);
        } else {
          console.error('AI function returned non-number:', testResult);
        }
      }

      promptEl.disabled = false;
      promptEl.style.opacity = '1';
      return;
    }
  } catch (err) {
    console.log('AI unavailable:', err.message);
  }

  // Fallback: default animation
  brightnessFunc = defaultBrightness;
  startAnimation(3, true);
  promptEl.disabled = false;
  promptEl.style.opacity = '1';
});

// ====================================================================
// SESSION STORAGE
// ====================================================================
let sessionEntries = [];
let activeEntryId = null;
let activeEntryCode = null; // Store the code string for session entries

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function captureThumbnail() {
  const mainCanvas = document.querySelector('#canvas-wrap canvas');
  if (!mainCanvas) return null;
  const thumb = document.createElement('canvas');
  thumb.width = 120;
  thumb.height = 120;
  const ctx = thumb.getContext('2d');
  ctx.drawImage(mainCanvas, 0, 0, 120, 120);
  return thumb.toDataURL('image/png');
}

function saveEntry() {
  const promptText = document.getElementById('prompt').value.trim() || 'untitled';
  const thumbnail = captureThumbnail();

  const entry = {
    id: activeEntryId || uid(),
    prompt: promptText,
    code: activeEntryCode,
    mode: currentMode,
    duration: tl ? tl.duration() : 3,
    yoyo: tl ? tl.yoyo() : true,
    thumbnail: thumbnail,
    timestamp: Date.now()
  };

  if (activeEntryId) {
    const idx = sessionEntries.findIndex(e => e.id === activeEntryId);
    if (idx !== -1) sessionEntries[idx] = entry;
    else { sessionEntries.push(entry); activeEntryId = entry.id; }
  } else {
    sessionEntries.push(entry);
    activeEntryId = entry.id;
  }

  persistSession();
  renderHistory();
}

function loadEntry(id) {
  const entry = sessionEntries.find(e => e.id === id);
  if (!entry) return;

  activeEntryId = id;
  document.getElementById('prompt').value = entry.prompt;

  if (entry.code) {
    const fn = compileAnimation(entry.code);
    if (fn) brightnessFunc = fn;
    activeEntryCode = entry.code;
  } else {
    brightnessFunc = defaultBrightness;
  }

  currentMode = entry.mode || 'bands';
  const mode = MODES[currentMode];
  gridSize = mode.grid;
  greyLevels = mode.levels;
  cellSize = CANVAS_SIZE / gridSize;
  document.getElementById('grid-info').textContent = mode.label;
  document.querySelector('.mode-btn.active').classList.remove('active');
  document.querySelector(`.mode-btn[data-mode="${currentMode}"]`).classList.add('active');

  initGrid();
  startAnimation(entry.duration || 3, entry.yoyo !== false);
  renderHistory();
}

function deleteEntry(id) {
  sessionEntries = sessionEntries.filter(e => e.id !== id);
  if (activeEntryId === id) activeEntryId = null;
  persistSession();
  renderHistory();
}

function newAnimation() {
  activeEntryId = null;
  activeEntryCode = null;
  document.getElementById('prompt').value = '';
  brightnessFunc = defaultBrightness;
  startAnimation(3, true);
  renderHistory();
}

function persistSession() {
  try {
    sessionStorage.setItem('at_session', JSON.stringify(sessionEntries));
  } catch (e) {}
}

function restoreSession() {
  try {
    const raw = sessionStorage.getItem('at_session');
    if (raw) { sessionEntries = JSON.parse(raw); renderHistory(); }
  } catch (e) { sessionEntries = []; }
}

function renderHistory() {
  const container = document.getElementById('history');
  container.innerHTML = '';

  sessionEntries.forEach(entry => {
    const card = document.createElement('div');
    card.className = 'history-card' + (entry.id === activeEntryId ? ' active' : '');

    if (entry.thumbnail) {
      const img = document.createElement('img');
      img.src = entry.thumbnail;
      img.alt = entry.prompt;
      card.appendChild(img);
    }

    const label = document.createElement('div');
    label.className = 'card-label';
    label.textContent = entry.prompt;
    card.appendChild(label);

    const modeLabel = document.createElement('div');
    modeLabel.className = 'card-mode';
    modeLabel.textContent = entry.mode;
    card.appendChild(modeLabel);

    const del = document.createElement('button');
    del.className = 'card-delete';
    del.textContent = '├ГтАФ';
    del.addEventListener('click', (ev) => { ev.stopPropagation(); deleteEntry(entry.id); });
    card.appendChild(del);

    card.addEventListener('click', () => loadEntry(entry.id));
    container.appendChild(card);
  });
}

document.getElementById('btn-save').addEventListener('click', saveEntry);
document.getElementById('btn-new').addEventListener('click', newAnimation);
restoreSession();

// ====================================================================
// GIF EXPORT
// ====================================================================
let isExporting = false;

document.getElementById('btn-download').addEventListener('click', () => {
  if (isExporting) return;
  exportGif();
});

function exportGif() {
  isExporting = true;
  const btn = document.getElementById('btn-download');
  const progressEl = document.getElementById('export-progress');
  btn.classList.add('recording');
  btn.disabled = true;
  btn.textContent = 'recording...';

  if (tl) tl.pause();

  const gif = new GIF({
    workers: 2,
    quality: 10,
    width: CANVAS_SIZE,
    height: CANVAS_SIZE,
    workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js'
  });

  const totalFrames = 60;
  const delay = Math.round(2000 / totalFrames);
  const mainCanvas = document.querySelector('#canvas-wrap canvas');

  for (let i = 0; i <= totalFrames; i++) {
    animProgress.value = i / totalFrames;
    updateGrid();

    const ctx = mainCanvas.getContext('2d');
    ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    for (let row = 0; row < gridSize; row++) {
      for (let col = 0; col < gridSize; col++) {
        const raw = gridValues[row][col];
        const quantized = quantize(raw, greyLevels);
        const grey = Math.round(quantized * 255);
        ctx.fillStyle = `rgb(${grey},${grey},${grey})`;
        ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
      }
    }

    gif.addFrame(mainCanvas, { copy: true, delay: delay });
    progressEl.textContent = `frame ${i + 1}/${totalFrames + 1}`;
  }

  progressEl.textContent = 'encoding...';

  gif.on('finished', (blob) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const promptText = document.getElementById('prompt').value.trim() || 'animation';
    const safeName = promptText.replace(/[^a-z0-9\-_ ]/gi, '').replace(/\s+/g, '-').slice(0, 40);
    a.href = url;
    a.download = `${safeName}_${currentMode}.gif`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    isExporting = false;
    btn.classList.remove('recording');
    btn.disabled = false;
    btn.textContent = 'download gif';
    progressEl.textContent = '';

    startAnimation();
  });

  gif.render();
}
</script>
</body>
</html>
